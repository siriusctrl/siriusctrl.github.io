<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title description">
  <title id="title">fmtview minimal behavior portrait</title>
  <desc id="description">Irregular raw rows pass through one scan line and emerge as a navigable indented structure.</desc>
  <style>
    :root{--paper:#efeee9;--ink:#202321;--muted:#737873;--faint:#c5c6c0;--rule:#d2d2cc;--accent:#b63d34;--accent-soft:#e6cfca}
    .paper{fill:var(--paper)}.frame,.guide,.rail,.scan{fill:none;vector-effect:non-scaling-stroke}
    .frame{stroke:var(--rule);stroke-width:1}.guide{stroke:var(--faint);stroke-width:1;stroke-dasharray:3 12}.rail{stroke:var(--ink);stroke-width:1.5}.scan{stroke:var(--accent);stroke-width:2}
    .row{fill:var(--ink);opacity:.15}.row.accent{fill:var(--accent);opacity:.78}.match{fill:var(--accent-soft)}
    .label,.micro{font-family:"Geist Mono","SFMono-Regular",Consolas,monospace;fill:var(--ink)}
    .label{font-size:17px;letter-spacing:.13em}.micro{fill:var(--muted);font-size:13px;letter-spacing:.11em}.accent-text{fill:var(--accent)}
    .piece{transform-box:fill-box;transform-origin:center;will-change:transform,opacity}
    .raw{animation:raw-in 1050ms cubic-bezier(.16,1,.3,1) 80ms both}.tree{animation:tree-in 1120ms cubic-bezier(.16,1,.3,1) 220ms both}
    .rail-draw{stroke-dasharray:700;animation:draw 1050ms cubic-bezier(.16,1,.3,1) 600ms both}.scan-line{animation:scan 1200ms cubic-bezier(.16,1,.3,1) 430ms both}
    @keyframes raw-in{0%{opacity:0;transform:translate(-80px,40px) rotate(-1.5deg)}72%{opacity:1;transform:translate(4px,-2px)}100%{opacity:1;transform:none}}
    @keyframes tree-in{0%{opacity:0;transform:translate(85px,-40px) rotate(1.2deg)}72%{opacity:1;transform:translate(-4px,2px)}100%{opacity:1;transform:none}}
    @keyframes draw{from{stroke-dashoffset:700}to{stroke-dashoffset:0}}
    @keyframes scan{0%{opacity:0;transform:translateX(-150px)}25%,75%{opacity:1}100%{opacity:0;transform:translateX(150px)}}
    @media(prefers-color-scheme:dark){:root{--paper:#1a1d1b;--ink:#e8e9e4;--muted:#9da39e;--faint:#454a46;--rule:#343835;--accent:#e0675c;--accent-soft:#57332f}}
    @media(prefers-reduced-motion:reduce){.piece,.rail-draw,.scan-line{animation:none}.scan-line{display:none}}
  </style>
  <rect class="paper" width="1600" height="1000"/><rect class="frame" x="44.5" y="44.5" width="1511" height="911"/>
  <text class="label" x="92" y="102">FMTVIEW / FIND</text><text class="micro accent-text" x="1508" y="102" text-anchor="end">02 / 03</text>
  <path class="guide" d="M220 500H1380M800 180V820"/>

  <g class="piece raw">
    <path class="rail" d="M300 285V715" opacity=".35"/>
    <rect class="row" x="350" y="300" width="300" height="20"/>
    <rect class="row" x="350" y="365" width="230" height="20"/>
    <rect class="row" x="350" y="430" width="345" height="20"/>
    <rect class="row accent" x="350" y="495" width="195" height="20"/>
    <rect class="row" x="350" y="560" width="285" height="20"/>
    <rect class="row" x="350" y="625" width="245" height="20"/>
    <rect class="row" x="350" y="690" width="320" height="20"/>
  </g>

  <g><path class="guide" d="M745 245V755M855 245V755"/><path class="scan scan-line" d="M800 265V735"/></g>

  <g class="piece tree">
    <path class="rail rail-draw" d="M920 285V715M1005 350V650M1090 430V585"/>
    <rect class="row" x="950" y="300" width="245" height="20"/>
    <rect class="row" x="1035" y="365" width="290" height="20"/>
    <rect class="row" x="1120" y="430" width="205" height="20"/>
    <g style="transform-origin:1225px 505px"><rect class="match" x="1120" y="483" width="210" height="44"/><rect fill="var(--accent)" x="1120" y="483" width="6" height="44"/></g>
    <rect class="row accent" x="1140" y="495" width="155" height="20"/>
    <rect class="row" x="1120" y="560" width="250" height="20"/>
    <rect class="row" x="1035" y="625" width="185" height="20"/>
    <rect class="row" x="950" y="690" width="270" height="20"/>
  </g>
</svg>
