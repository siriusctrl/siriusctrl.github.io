<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title description">
  <title id="title">picoagent minimal behavior portrait</title>
  <desc id="description">A single agent loop branches through one tool call into background work and a durable run directory.</desc>
  <style>
    :root{--paper:#efeee9;--ink:#202321;--muted:#737873;--faint:#c5c6c0;--rule:#d2d2cc;--accent:#b63d34;--accent-soft:#e6cfca}
    .paper{fill:var(--paper)}.frame,.guide,.path,.active-path,.node{fill:none;vector-effect:non-scaling-stroke}
    .frame{stroke:var(--rule);stroke-width:1}.guide{stroke:var(--faint);stroke-width:1;stroke-dasharray:3 12}
    .path{stroke:var(--ink);stroke-width:1.5}.active-path{stroke:var(--accent);stroke-width:2.3}
    .node{fill:var(--paper);stroke:var(--ink);stroke-width:1.5}.node.active{fill:var(--accent-soft);stroke:var(--accent);stroke-width:1.8}
    .dot{fill:var(--ink)}.dot.accent{fill:var(--accent)}
    .label,.micro,.node-label{font-family:"Geist Mono","SFMono-Regular",Consolas,monospace;fill:var(--ink)}
    .label{font-size:17px;letter-spacing:.13em}.micro{fill:var(--muted);font-size:13px;letter-spacing:.11em}.node-label{font-size:16px;letter-spacing:.08em}.accent-text{fill:var(--accent)}
    .piece{transform-box:fill-box;transform-origin:center;will-change:transform,opacity}
    .loop,.branch{animation:agent-in 1100ms cubic-bezier(.16,1,.3,1) 80ms both}
    .draw{stroke-dasharray:1400;animation:draw 1250ms cubic-bezier(.16,1,.3,1) 620ms both}
    @keyframes agent-in{0%{opacity:0;transform:translateY(55px)}72%{opacity:1;transform:translateY(-4px)}100%{opacity:1;transform:none}}
    @keyframes draw{from{stroke-dashoffset:1400}to{stroke-dashoffset:0}}
    @media(prefers-color-scheme:dark){:root{--paper:#1a1d1b;--ink:#e8e9e4;--muted:#9da39e;--faint:#454a46;--rule:#343835;--accent:#e0675c;--accent-soft:#57332f}}
    @media(prefers-reduced-motion:reduce){.piece,.draw{animation:none}}
  </style>
  <rect class="paper" width="1600" height="1000"/><rect class="frame" x="44.5" y="44.5" width="1511" height="911"/>
  <text class="label" x="92" y="102">PICOAGENT / LOOP</text><text class="micro" x="1508" y="102" text-anchor="end">HEADLESS</text>
  <path class="guide" d="M220 470H1380M800 180V820"/>

  <g class="piece loop">
    <path class="path" d="M510 470H560M770 470H820M1030 470H1080M1290 470H1350V300H405V400"/>
    <path class="active-path draw" d="M770 470H820M925 540V650H1125"/>
    <g><rect class="node" x="300" y="400" width="210" height="140"/><text class="node-label" x="405" y="478" text-anchor="middle">CONTEXT</text><circle class="dot" cx="510" cy="470" r="6"/></g>
    <g><rect class="node active" x="560" y="400" width="210" height="140"/><text class="node-label accent-text" x="665" y="478" text-anchor="middle">MODEL</text><circle class="dot accent" cx="560" cy="470" r="7"/><circle class="dot accent" cx="770" cy="470" r="7"/></g>
    <g><rect class="node active" x="820" y="400" width="210" height="140"/><text class="node-label accent-text" x="925" y="478" text-anchor="middle">TOOL</text><circle class="dot accent" cx="820" cy="470" r="7"/><circle class="dot accent" cx="1030" cy="470" r="7"/><circle class="dot accent" cx="925" cy="540" r="7"/></g>
    <g><rect class="node" x="1080" y="400" width="210" height="140"/><text class="node-label" x="1185" y="478" text-anchor="middle">RESULT</text><circle class="dot" cx="1080" cy="470" r="6"/></g>
  </g>

  <g class="piece branch">
    <path class="path" d="M525 650H1125"/>
    <circle class="node" cx="525" cy="650" r="16"/><circle class="dot" cx="525" cy="650" r="5"/>
    <circle class="node active" cx="725" cy="650" r="17"/><circle class="dot accent" cx="725" cy="650" r="5"/>
    <circle class="node" cx="925" cy="650" r="16"/><circle class="dot" cx="925" cy="650" r="5"/>
    <rect class="node active" x="1125" y="595" width="205" height="110"/><text class="node-label accent-text" x="1227.5" y="657" text-anchor="middle">RUN DIR</text>
    <text class="micro" x="525" y="700" text-anchor="middle">MCP</text><text class="micro accent-text" x="725" y="700" text-anchor="middle">TASK</text><text class="micro" x="925" y="700" text-anchor="middle">MEMORY</text>
  </g>
</svg>
